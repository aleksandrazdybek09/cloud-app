<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Task Manager</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button#add-btn { padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        ul { list-style: none; padding: 0; }
        li { background: #fff; border-bottom: 1px solid #eee; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        li:last-child { border-bottom: none; }
        .task-info { display: flex; align-items: center; gap: 10px; }
        .delete-btn { background-color: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .delete-btn:hover { background-color: #c82333; }
    </style>
</head>
<body>

<div class="container">
    <h2>Lista Zadań Cloud</h2>

    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Nowe zadanie...">
        <button id="add-btn" onclick="addTask()">Dodaj</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
    // ADRES TWOJEGO API NA AZURE
    const API_URL = 'https://cloud-task-manager-api-zdybek-gdbaacducgfeeyah.westeurope-01.azurewebsites.net/api/Tasks';

    // 1. Pobieranie zadań
    async function fetchTasks() {
        try {
            const response = await fetch(API_URL);
            const tasks = await response.json();
            const list = document.getElementById('taskList');
            list.innerHTML = '';

            tasks.forEach(task => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <div class="task-info">
                        <span>${task.name || task.title}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">Usuń</button>
                `;
                list.appendChild(li);
            });
        } catch (error) {
            console.error('Błąd pobierania:', error);
        }
    }

    // 2. Dodawanie zadania
    async function addTask() {
        const input = document.getElementById('taskInput');
        if (!input.value) return;

        const newTask = {
            name: input.value, // Upewnij się czy w modelu masz Name czy Title
            isCompleted: false
        };

        try {
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newTask)
            });
            input.value = '';
            fetchTasks();
        } catch (error) {
            console.error('Błąd dodawania:', error);
        }
    }

    // 3. Usuwanie zadania (NOWOŚĆ 8.4)
    async function deleteTask(id) {
        if (!confirm("Czy na pewno chcesz usunąć to zadanie?")) return;

        try {
            const response = await fetch(`${API_URL}/${id}`, {
                method: 'DELETE'
            });

            if (response.ok) {
                fetchTasks(); // Odśwież listę po usunięciu
            } else {
                alert("Błąd podczas usuwania zadania.");
            }
        } catch (error) {
            console.error('Błąd sieci:', error);
        }
    }

    // Uruchom pobieranie na starcie
    fetchTasks();
</script>

</body>
</html>
