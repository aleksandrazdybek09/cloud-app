#            Discover all capabilities of Qodana in our documentation           #
#             https://www.jetbrains.com/help/qodana/about-qodana.html           #
#-------------------------------------------------------------------------------#

name: Qodana
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
steps:
  - uses: actions/checkout@v3

  - name: Setup .NET
    uses: actions/setup-dotnet@v3
    with:
      dotnet-version: '8.0.x'

  - name: Restore dependencies
    run: dotnet restore  # Bez gwiazdek, sam znajdzie co trzeba w solucji

  - name: Build Backend
    run: dotnet build --configuration Release --no-restore

  - name: Run Tests
    # Tutaj musimy być precyzyjni, żeby wiedział co testować
    run: dotnet test Backend.Tests/Backend.Tests.csproj --configuration Release --no-build