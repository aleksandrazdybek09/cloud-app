#            Discover all capabilities of Qodana in our documentation           #
#             https://www.jetbrains.com/help/qodana/about-qodana.html           #
#-------------------------------------------------------------------------------#

name: Qodana
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
steps:
  - uses: actions/checkout@v3

  - name: Setup .NET
    uses: actions/setup-dotnet@v3
    with:
      dotnet-version: '8.0.x'

  - name: Restore dependencies
    # Przywracamy biblioteki dla obu projektów osobno
    run: |
      dotnet restore backend/Backend.csproj
      dotnet restore Backend.Tests/Backend.Tests.csproj

  - name: Build Backend
    # Budujemy tylko główny backend
    run: dotnet build backend/Backend.csproj --configuration Release --no-restore

  - name: Run Tests
    # Uruchamiamy testy bezpośrednio na pliku projektu testowego
    run: dotnet test Backend.Tests/Backend.Tests.csproj --configuration Release --no-build --verbosity normal