name: Azure CI/CD Backend and Frontend

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_test_backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        # Ta linia szuka wszystkich plików .csproj w całym repozytorium
        run: dotnet restore **/*.csproj

      - name: Build Backend
        # Budujemy wszystko, co znaleźliśmy
        run: dotnet build **/*.csproj --configuration Release --no-restore

      - name: Run Tests
        # Szukamy konkretnie projektu testowego i go uruchamiamy
        run: dotnet test **/*.Tests.csproj --configuration Release --no-build --verbosity normal
  deploy_frontend:
    needs: build_and_test_backend
    runs-on: ubuntu-latest
    name: Build and Deploy Frontend
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_MANGO_RIVER_0974FA21E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./frontend"
          api_location: ""
          output_location: "build"